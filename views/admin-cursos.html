<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .barra-tabela { background-color: #2c5282 !important; color: #fff !important; }
        #arquivoImagem::file-selector-button,
        #arquivoImagem::-webkit-file-upload-button {
            background-color: #198754;
            color: #fff;
            border: none;
            padding: 0.4rem 0.85rem;
            border-radius: 0.375rem;
            margin-right: 0.75rem;
            font-weight: 500;
            cursor: pointer;
        }
        #arquivoImagem::file-selector-button:hover,
        #arquivoImagem::-webkit-file-upload-button:hover {
            background-color: #157347;
        }
    </style>
</head>
<body class="p-3 bg-light">
    <a href="/" class="btn btn-success mb-3">Voltar</a>

    <div id="msg"></div>

    <div class="card shadow-sm mb-4 border-success border-2">
        <div class="card-header bg-success text-white fw-semibold py-3">Cadastro de cursos</div>
        <div class="card-body">
            <form id="f">
                <input type="hidden" id="idEdit">
                <input type="hidden" id="imagem" value="">
                <div class="row g-2">
                    <div class="col-md-6">
                        <label class="form-label">Título</label>
                        <input class="form-control" id="titulo" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Imagem</label>
                        <input type="file" class="form-control" id="arquivoImagem" accept="image/*">
                        <small class="text-muted" id="imagemInfo">Nenhum arquivo (ou mantenha o atual ao editar)</small>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" required></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Data de início</label>
                        <input type="date" class="form-control" id="data_inicio" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Duração</label>
                        <input class="form-control" id="duracao" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preço</label>
                        <input type="text" class="form-control" id="preco" placeholder="R$ 0,00" autocomplete="off" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Instrutor</label>
                        <input class="form-control" id="instrutor" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Nível</label>
                        <select class="form-select" id="nivel" required>
                            <option value="">Selecione...</option>
                            <option value="Básico">Básico</option>
                            <option value="Intermediário">Intermediário</option>
                            <option value="Avançado">Avançado</option>
                            <option value="Expert">Expert</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Vagas</label>
                        <input type="number" min="0" class="form-control" id="vagas_disponiveis" required>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-success" id="btnOk">Salvar</button>
                    <button type="button" class="btn btn-outline-secondary ms-2" id="btnCanc" style="display:none">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header barra-tabela fw-semibold py-3">Lista de cursos (IDs e dados)</div>
        <div class="card-body p-0">
            <table class="table table-bordered table-hover mb-0">
                <thead class="barra-tabela">
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Preço</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tb"></tbody>
            </table>
        </div>
    </div>
    <script src="/js/admin-cursos.js"></script>
</body>
</html>
